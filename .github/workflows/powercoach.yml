name: Powercoach

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/manager/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  powercoach:
    name: Powercoach CI & CD
    steps:
      - uses: ./.github/actions/detect
      - uses: ./.github/actions/ci
      - uses: ./.github/actions/cd

  CI:
    needs: [detect]
    uses: ./.github/workflows/ci.yml
    if: needs.detect.outputs.ci-enabled == 'true'
    with:
      ci-filters: ${{ needs.detect.outputs.ci-filters }}

  CD:
    needs: [detect, CI]
    uses: ./.github/workflows/cd.yml
    if: >
      needs.detect.outputs.cd-enabled == 'true' &&
      needs.CI.result == 'success'
    with:
      detection: ${{ needs.detect.outputs }}
      vars:
        gcp-artifacts-repository: ${{ vars.GCP_ARTIFACTS_REPOSITORY }}
        gcp-domain: ${{ vars.GCP_DOMAIN }}
        gcp-project-id: ${{ vars.GCP_PROJECT_ID }}
        gcp-region: ${{ vars.GCP_REGION }}
        gcp-service: ${{ vars.GCP_SERVICE }}
        vcl-project: ${{ vars.VCL_PROJECT }}
        vcl-team: ${{ vars.VCL_TEAM }}
    secrets: inherit
