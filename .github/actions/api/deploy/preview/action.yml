name: API preview deployment

inputs:
  artifacts-repository:
    description: Artifact repository
    required: true
  branch-slug:
    description: Slugified branch name of the pull request
    required: true
  domain:
    description: Google Cloud Run domain
    required: true
  hash:
    description: Unique hash identifier
    required: true
  project-id:
    description: Project ID
    required: true
  region:
    description: Region name
    required: true
  service:
    description: Service name
    required: true

outputs:
  url:
    description: Deployed Manager URL
    value: ${{ steps.url.outputs.value }}

runs:
  using: composite
  steps:
    - name: Inputs
      shell: bash
      run: |
        {
          echo "### API preview inputs"
          echo ""
          echo "| Key | Value |"
          echo "| --- | --- |"
          echo "| Artifactory Registry | ${{ inputs.artifacts-repository || '❌' }} |"
          echo "| Branch slug | ${{ inputs.branch-slug || '❌' }} |"
          echo "| Hash | ${{ inputs.hash || '❌' }} |"
          echo "| Project ID | ${{ inputs.project-id || '❌' }} |"
          echo "| Region | ${{ inputs.region || '❌' }} |"
          echo "| Service | ${{ inputs.service || '❌' }} |"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Compute API URL
      id: url
      uses: ./.github/actions/google/url/compute
      with:
        branch-slug: ${{ inputs.branch-slug }}
        domain: ${{ inputs.domain }}
        service: ${{ inputs.service }}

    - name: State
      id: state
      uses: ./.github/actions/google/revision/state
      with:
        artifacts-repository: ${{ inputs.artifacts-repository }}
        hash: ${{ inputs.hash }}
        project-id: ${{ inputs.project-id }}
        region: ${{ inputs.region }}
        service: ${{ inputs.service }}

    - name: Actions
      id: actions
      shell: bash
      run: |
        echo "push=$([[ -z "${{ steps.state.outputs.version }}" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        echo "deploy=$([[ -z "${{ steps.state.outputs.revision }}" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

    - name: Build
      id: build
      if: steps.actions.outputs.push == 'true'
      uses: ./.github/actions/api/build
      with:
        artifacts-repository: ${{ inputs.artifacts-repository }}
        hash: ${{ inputs.hash }}
        project-id: ${{ inputs.project-id }}
        region: ${{ inputs.region }}
        service: ${{ inputs.service }}

    - name: Deploy
      id: deploy
      if: steps.actions.outputs.deploy == 'true'
      uses: ./.github/actions/google/revision/deploy
      with:
        branch-slug: ${{ inputs.branch-slug }}
        image: ${{ steps.build.outputs.image }}
        project-id: ${{ inputs.project-id }}
        region: ${{ inputs.region }}
        service: ${{ inputs.service }}

    - name: Revision
      id: revision
      shell: bash
      run: echo "value=${{ steps.deploy.outputs.revision || steps.state.outputs.revision }}" >> "$GITHUB_OUTPUT"

    - name: Route traffic
      id: route
      uses: ./.github/actions/google/revision/route
      with:
        branch-slug: ${{ inputs.branch-slug }}
        revision: ${{ steps.revision.outputs.value }}
        service: ${{ inputs.service }}

    - name: Outputs
      shell: bash
      run: |
        {
          echo "### API preview outputs"
          echo ""
          echo "| Key | Value |"
          echo "| --- | --- |"
          echo "| URL | ${{ steps.url.outputs.value || '❌' }} |"
          echo ""
          echo ""
          echo "##### Events"
          echo ""
          echo "- ⚙️ Computed url ⇒ ${{ steps.url.outputs.value }}"
          echo "- 📦 Build, push ⇒ ${{ steps.actions.outputs.push == 'true' && '✅' || '❌' }}"
          echo "- 🚀 Deploy ⇒ ${{ steps.actions.outputs.deploy == 'true' && '✅' || '❌' }}"
          echo "- 🔀 Routed traffic"
          echo "-      to ⇒ ${{ steps.revision.outputs.value || '❌' }}"
          echo "-      tag ⇒ ${{ inputs.branch-slug }}"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
