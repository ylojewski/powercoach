name: Build API
description: Builds the API app and the Docker file based on the given hash

inputs:
  artifacts-repository:
    description: Artifact repository
    required: true
  hash:
    description: Source code hash
    required: true
  project-id:
    description: Project ID
    required: true
  region:
    description: Region name
    required: true
  service:
    description: Service name
    required: true

outputs:
  image:
    description: The Docker built & pushed image name
    value: ${{ steps.build-push.outputs.image }}

runs:
  using: composite
  steps:
    - name: Artifact Registry image
      id: image
      uses: ./.github/actions/google/image
      with:
        artifacts-repository: ${{ inputs.artifacts-repository }}
        hash: ${{ inputs.hash }}
        project-id: ${{ inputs.project-id }}
        region: ${{ inputs.region }}
        service: ${{ inputs.service }}

    - name: Build & push Docker image
      id: build-push
      shell: bash
      run: |
        file="${{ inputs.file }}"
        image="${{ inputs.image }}"

        echo "📦 Building Docker image with..."
        echo "     -- File ⇒ $file"
        echo "     -- Image ⇒ $image"

        docker build -f "$file" -t "$image" .

        echo "✅ Built"
        echo "📤 Pushing..."

        docker push "$image"

        echo "✅ Pushed"
        echo "image=$image" >> "$GITHUB_OUTPUT"
